# ============================================================================
# Nginx config for storage.inkdapper.com → MinIO (port 9000)
# Copy to: /etc/nginx/sites-available/storage.inkdapper.com.conf
# Enable:  sudo ln -sf /etc/nginx/sites-available/storage.inkdapper.com.conf /etc/nginx/sites-enabled/
# SSL:     sudo certbot --nginx -d storage.inkdapper.com
# ============================================================================

server {
    listen 80;
    server_name storage.inkdapper.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name storage.inkdapper.com;

    ssl_certificate     /etc/letsencrypt/live/storage.inkdapper.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storage.inkdapper.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large file uploads via MinIO
    client_max_body_size 100M;
    access_log off;

    location / {
        proxy_pass              http://127.0.0.1:9000;
        proxy_set_header        Host              $http_host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_http_version      1.1;
        proxy_set_header        Connection        "";
        chunked_transfer_encoding off;
        proxy_connect_timeout   300s;
        proxy_send_timeout      300s;
        proxy_read_timeout      300s;
        add_header Cache-Control "public, max-age=86400";
    }
}
