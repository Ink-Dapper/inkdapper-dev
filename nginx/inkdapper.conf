# ============================================================================
# Nginx configuration for InkDapper
# Domains:
#   www.inkdapper.com / inkdapper.com  →  Frontend (React static build)
#   admin.inkdapper.com                →  Admin panel (React static build)
#   api.inkdapper.com                  →  Backend Express (port 4000)
#   storage.inkdapper.com              →  MinIO object storage (port 9000)
#
# SETUP INSTRUCTIONS:
#   1. Copy to /etc/nginx/sites-available/inkdapper.conf on your VPS
#   2. Update PROJECT_ROOT (search/replace /var/www/inkdapper-dev with your path)
#   3. Run: sudo ln -s /etc/nginx/sites-available/inkdapper.conf /etc/nginx/sites-enabled/
#   4. Run: sudo nginx -t  (test config)
#   5. Issue SSL certs: sudo certbot --nginx -d inkdapper.com -d www.inkdapper.com
#                        sudo certbot --nginx -d admin.inkdapper.com
#                        sudo certbot --nginx -d api.inkdapper.com
#                        sudo certbot --nginx -d storage.inkdapper.com
#   6. Run: sudo systemctl reload nginx
# ============================================================================

# ── Shared gzip settings ────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
  text/plain text/css text/xml application/json
  application/javascript application/xml+rss
  application/atom+xml image/svg+xml;

# ============================================================================
# HTTP → HTTPS redirect (all domains)
# ============================================================================
server {
    listen 80;
    server_name inkdapper.com www.inkdapper.com admin.inkdapper.com api.inkdapper.com storage.inkdapper.com;
    return 301 https://$host$request_uri;
}

# ============================================================================
# www.inkdapper.com / inkdapper.com  →  Frontend static build
# ============================================================================
server {
    listen 443 ssl http2;
    server_name inkdapper.com www.inkdapper.com;

    ssl_certificate     /etc/letsencrypt/live/inkdapper.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inkdapper.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # !! UPDATE path below to your actual frontend dist directory !!
    root  /var/www/inkdapper-dev/frontend/dist;
    index index.html;

    # Static assets — cache for 1 year (hashed filenames from Vite build)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SEO files
    location ~* \.(xml|txt)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

# ============================================================================
# admin.inkdapper.com  →  Admin panel static build
# ============================================================================
server {
    listen 443 ssl http2;
    server_name admin.inkdapper.com;

    ssl_certificate     /etc/letsencrypt/live/admin.inkdapper.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.inkdapper.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # !! UPDATE path below to your actual admin dist directory !!
    root  /var/www/inkdapper-dev/admin/dist;
    index index.html;

    # Static assets — cache for 1 year
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

# ============================================================================
# api.inkdapper.com  →  Express backend (port 4000)
# ============================================================================
server {
    listen 443 ssl http2;
    server_name api.inkdapper.com;

    ssl_certificate     /etc/letsencrypt/live/api.inkdapper.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.inkdapper.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large file uploads (product images, banners)
    client_max_body_size 50M;

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-running upload requests
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}

# ============================================================================
# storage.inkdapper.com  →  MinIO object storage (port 9000)
# Public read access for product images and banners
# ============================================================================
server {
    listen 443 ssl http2;
    server_name storage.inkdapper.com;

    ssl_certificate     /etc/letsencrypt/live/storage.inkdapper.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/storage.inkdapper.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large file uploads via MinIO API
    client_max_body_size 100M;

    # Disable access log for static file requests (high volume)
    access_log off;

    location / {
        proxy_pass              http://127.0.0.1:9000;
        proxy_set_header        Host              $http_host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_http_version      1.1;
        proxy_set_header        Connection        "";
        chunked_transfer_encoding off;

        # Increase timeouts for large file downloads
        proxy_connect_timeout   300s;
        proxy_send_timeout      300s;
        proxy_read_timeout      300s;

        # Cache static assets served from MinIO
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }
}

# ============================================================================
# NOTE: MinIO Admin Console (port 9001) is intentionally NOT exposed.
# Access it securely via SSH tunnel when needed:
#   ssh -L 9001:localhost:9001 user@your-vps-ip
# Then open: http://localhost:9001 in your browser
# ============================================================================
