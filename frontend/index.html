    <!-- Structured Data for Google -->
    <script type="application/ld+json">

      "@context": "https://schema.org",

    <!-- Preload critical resources -->
    <!-- NOTE: modulepreload for main.jsx removed — Vite injects correct hashed paths during build -->

    <!-- Preconnect to all external origins used at startup (eliminates TCP/TLS overhead) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.inkdapper.com">

    <!-- DNS prefetch for lower-priority third-party origins -->
    <link rel="dns-prefetch" href="https://checkout.razorpay.com">
    <link rel="dns-prefetch" href="https://api.inkdapper.com">
    <link rel="dns-prefetch" href="https://storage.inkdapper.com">

    <!-- Non-blocking font load: stylesheet is fetched async, swapped in on load -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Prata&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Prata&display=swap"></noscript>
    
    <!-- Inline critical CSS — matches SkeletonLoader.jsx exactly -->
    <style>
      .loader-container {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #0d0d0e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        overflow: hidden;
      }

      /* Ambient glow blobs */
      .loader-glow-1 {
        position: absolute;
        top: 25%;
        left: 50%;
        transform: translateX(-50%);
        width: 384px; height: 384px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(249,115,22,0.12) 0%, transparent 70%);
        filter: blur(40px);
        pointer-events: none;
      }
      .loader-glow-2 {
        position: absolute;
        bottom: 25%;
        left: 33%;
        width: 256px; height: 256px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
        filter: blur(32px);
        pointer-events: none;
      }

      /* Icon box */
      .loader-icon-wrap {
        position: relative;
        margin-bottom: 2rem;
      }
      .loader-icon-ping {
        position: absolute;
        inset: 0;
        border-radius: 1rem;
        background: linear-gradient(135deg, #f97316, #f59e0b);
        opacity: 0.3;
        animation: inkping 1.8s ease-in-out infinite;
      }
      .loader-icon-box {
        position: relative;
        width: 80px; height: 80px;
        border-radius: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f97316, #f59e0b);
        box-shadow: 0 0 40px rgba(249,115,22,0.45), 0 0 80px rgba(249,115,22,0.15);
      }
      .loader-icon-box svg {
        width: 40px; height: 40px;
        color: #fff;
        fill: currentColor;
      }

      /* Brand text */
      .loader-brand {
        text-align: center;
        margin-bottom: 0.25rem;
      }
      .loader-brand h1 {
        font-family: 'Bebas Neue', 'Impact', sans-serif;
        font-size: clamp(2rem, 6vw, 2.8rem);
        letter-spacing: 0.18em;
        background: linear-gradient(135deg, #f97316, #f59e0b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 0;
      }
      .loader-brand p {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.28em;
        color: #475569;
        margin: 2px 0 0 0;
      }

      /* Loading bar */
      .loader-bar-track {
        position: relative;
        margin-top: 2rem;
        width: 192px; height: 2px;
        border-radius: 9999px;
        overflow: hidden;
        background: rgba(255,255,255,0.06);
      }
      .loader-bar-fill {
        position: absolute;
        top: 0; left: 0;
        height: 100%;
        border-radius: 9999px;
        background: linear-gradient(90deg, #f97316, #f59e0b);
        box-shadow: 0 0 8px rgba(249,115,22,0.6);
        animation: inkload 1.6s ease-in-out infinite;
      }

      /* Dot indicators */
      .loader-dots {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 20px;
      }
      .loader-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: rgba(255,255,255,0.12);
      }
      .loader-dot:nth-child(1) { background: #f97316; animation: inkdot 1.2s ease-in-out 0s infinite; }
      .loader-dot:nth-child(2) { animation: inkdot 1.2s ease-in-out 0.2s infinite; }
      .loader-dot:nth-child(3) { animation: inkdot 1.2s ease-in-out 0.4s infinite; }

      @keyframes inkping {
        0%, 100% { transform: scale(1); opacity: 0.3; }
        50%       { transform: scale(1.15); opacity: 0.5; }
      }
      @keyframes inkload {
        0%   { width: 0%;  left: 0%; }
        50%  { width: 70%; left: 15%; }
        100% { width: 0%;  left: 100%; }
      }
      @keyframes inkdot {
        0%, 100% { opacity: 0.2; transform: scale(1); background: rgba(255,255,255,0.12); }
        50%       { opacity: 1;   transform: scale(1.4); background: #f97316; }
      }

      /* Prevent layout shifts */
      img { aspect-ratio: attr(width) / attr(height); }
    </style>
    
    <!-- swiper-custom.css is imported via JS bundle — no separate link needed -->
  </head>
  <body>
    <!-- Page Loader — matches SkeletonLoader.jsx design -->
    <div class="loader-container" id="pageLoader">
      <div class="loader-glow-1"></div>
      <div class="loader-glow-2"></div>

      <div class="loader-icon-wrap">
        <div class="loader-icon-ping"></div>
        <div class="loader-icon-box">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M16 2l4 4-4 3v11H8V9L4 6l4-4 4 2 4-2z" opacity="0.9"/>
          </svg>
        </div>
      </div>

      <div class="loader-brand">
        <h1>INK DAPPER</h1>
        <p>Premium Streetwear</p>
      </div>

      <div class="loader-bar-track">
        <div class="loader-bar-fill"></div>
      </div>

      <div class="loader-dots">
        <span class="loader-dot"></span>
        <span class="loader-dot"></span>
        <span class="loader-dot"></span>
      </div>
    </div>
    <div id="root"></div>
    
    <!-- Defer non-critical JavaScript -->
    <script type="module" src="/src/main.jsx" defer></script>
    <!-- Razorpay checkout.js is loaded dynamically inside PlaceOrder.jsx
         so it only runs when the user actually reaches the checkout page,
         preventing unused preload warnings on every other route. -->
    
    <!-- Loader Script -->
    <script>
      // Optimize initial load
      document.addEventListener('DOMContentLoaded', function() {
        const loader = document.getElementById('pageLoader');
        if (loader) {
          // Reduce initial load time by removing loader faster
          setTimeout(() => {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s ease-out';
            setTimeout(() => {
              loader.style.display = 'none';
            }, 300);
          }, 500);
        }
      });

      // Register service worker for asset caching & offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js', { scope: '/' }).catch(() => {});
        });
      }

      // Preload critical images
      const preloadImages = () => {
        const images = document.querySelectorAll('img[data-src]');
        images.forEach(img => {
          if (img.dataset.src) {
            img.src = img.dataset.src;
            img.removeAttribute('data-src');
          }
        });
      };

      // Intersection Observer for lazy loading
      if ('IntersectionObserver' in window) {
        const imageObserver = new IntersectionObserver((entries, observer) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              if (img.dataset.src) {
                img.src = img.dataset.src;
                img.removeAttribute('data-src');
              }
              observer.unobserve(img);
            }
          });
        });

        document.querySelectorAll('img[data-src]').forEach(img => {
          imageObserver.observe(img);
        });
      }
    </script>
  </body>
</html>
