<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link
      rel="icon"
      type="image/svg+xml"
      href="/ink_dapper_logo_white.svg"
    >
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >
    <title>Ink Dapper | Oversized Tees & Custom T-Shirts</title>
    <meta
      name="description"
      content="Ink Dapper specializes in oversized t-shirts, acid wash tees, custom oversized clothing, and solid color tees. Redefine your street style today!"
    >
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.inkdapper.com/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.inkdapper.com/">
    <meta property="og:title" content="Ink Dapper | Oversized Tees, Acid Wash T-Shirts & Custom Clothing">
    <meta property="og:description" content="Explore Ink Dapper's exclusive collection of oversized t-shirts, acid wash tees, customized oversized tees, and solid color tees. Perfect comfort and style for every vibe.">
    <meta property="og:image" content="https://www.inkdapper.com/path-to-your-logo-or-banner.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://www.inkdapper.com/">
    <meta property="twitter:title" content="Ink Dapper | Oversized Tees & Custom T-Shirts">
    <meta property="twitter:description" content="Explore Ink Dapper's exclusive collection of oversized t-shirts, acid wash tees, customized oversized tees, and solid color tees. Perfect comfort and style for every vibe.">
    <meta property="twitter:image" content="https://www.inkdapper.com/path-to-your-logo-or-banner.jpg">

    <!-- Additional SEO Meta Tags -->
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="author" content="Ink Dapper">
    <meta name="keywords" content="oversized t-shirts, acid wash tees, custom t-shirts, street style, fashion, clothing">
    
    <!-- Preload slider images -->
    <!-- <link rel="preload" href="/src/assets/slider/banner1.webp" as="image" fetchpriority="high">
<link rel="preload" href="/src/assets/slider/banner2.webp" as="image">
<link rel="preload" href="/src/assets/inkdapper_logo.svg" as="image"> -->
    <style>
      
      .loader-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
      }
      
      .loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }
      
      .logo-container {
        position: relative;
        width: 140px;
        height: 140px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      .loader-spinner {
        border: 4px solid rgba(0, 0, 0, 0.1);
        border-left: 4px solid #414141;
        border-radius: 50%;
        width: 140px;
        height: 140px;
        animation: spin 1.5s linear infinite;
        position: absolute;
      }
      
      .logo-container img {
        width: 90px;
        height: auto;
        animation: pulse 2s infinite;
      }
      
      .brand-name {
        font-family: 'Prata', serif;
        font-size: 32px;
        color: #414141;
        letter-spacing: 1px;
        position: relative;
        overflow: hidden;
      }
      
      .brand-name::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background-color: #414141;
        transform: translateX(-100%);
        animation: line-reveal 2s infinite;
      }
      
      .loading-text {
        font-size: 14px;
        color: #666;
        margin-top: 10px;
        letter-spacing: 2px;
        animation: blink 1.5s infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0% { transform: scale(0.95); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.8; }
      }
      
      @keyframes blink {
        0% { opacity: 0.3; }
        50% { opacity: 1; }
        100% { opacity: 0.3; }
      }
      
      .loader-container .hidden {
        opacity: 0;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <!-- Page Loader -->
    <div
      class="loader-container"
      id="pageLoader"
    >
      <div class="loader">
        <div class="logo-container">
          <div class="loader-spinner"></div>
          <img
            src="./src/assets/logo_only.png"
            alt="Ink Dapper Logo"
          >
        </div>
        <div class="brand-name">
          <p className="text-xl md:text-3xl font-medium">
            <span className="font-light">Ink</span>
            <span className="!font-[700]">Dapper</span>
          </p>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script
      type="module"
      src="/src/main.jsx"
    ></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <!-- Loader Script -->
    <script>
      window.addEventListener('load', function() {
        // Wait for all content including images to load
        setTimeout(() => {
          const loader = document.getElementById('pageLoader');
          if (loader) {
            loader.classList.add('hidden');
            // Remove from DOM after transition completes
            setTimeout(() => {
              loader.style.display = 'none';
            }, 500);
          }
        }, 800); // Increased timeout to ensure animations are visible
      });
    </script>
  </body>
</html>
